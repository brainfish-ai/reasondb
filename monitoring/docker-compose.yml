# Docker Compose for ReasonDB monitoring stack
# Usage: docker-compose -f monitoring/docker-compose.yml up -d

version: '3.8'

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: reasondb-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - reasondb-monitoring

  grafana:
    image: grafana/grafana:10.4.0
    container_name: reasondb-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=reasondb
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning:ro
      - ./grafana-dashboard.json:/var/lib/grafana/dashboards/reasondb.json:ro
    restart: unless-stopped
    networks:
      - reasondb-monitoring
    depends_on:
      - prometheus

  # Optional: Jaeger for distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: reasondb-jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped
    networks:
      - reasondb-monitoring

volumes:
  prometheus_data:
  grafana_data:

networks:
  reasondb-monitoring:
    driver: bridge
