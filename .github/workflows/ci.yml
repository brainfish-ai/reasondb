name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "assets/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "assets/**"
      - "LICENSE"
      - ".gitignore"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUSTC_WRAPPER: ""
  SCCACHE_GHA_ENABLED: "false"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  check:
    name: Check & Test
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: swatinem/rust-cache@v2
        with:
          shared-key: ci-cargo
      - name: Clippy
        run: cargo clippy --workspace --exclude reasondb --all-targets -- -D warnings
        env:
          RUSTC_WRAPPER: ""
      - name: Test
        run: cargo test --workspace --exclude reasondb
        env:
          RUSTC_WRAPPER: ""

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          shared-key: ci-cargo-release
      - name: Build release
        run: cargo build --workspace --exclude reasondb --release
        env:
          RUSTC_WRAPPER: ""
